<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nike - Just Do It</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="banner">
    <div class="container">
      <h1>Nike</h1>
      <h2>Just do it.</h2>
      <a href="#shopping-section" class="btn-blue">Shopping</a>
    </div>
  </div>

  <div class="cards">
    <div class="container">
      <h2>Items</h2>
      <div class="cards-flex">
        <div class="card">
          <img src="images/shoes.jpg" alt="Shoes">
          <h3>Shoes</h3>
        </div>
        <div class="card">
          <img src="images/t-shirt.webp" alt="T-shirts">
          <h3>T-shirts</h3>
        </div>
        <div class="card">
          <img src="images/jogging.webp" alt="Joggings">
          <h3>Joggings</h3>
        </div>
      </div>
    </div>
  </div>

  <div id="shopping-section">
    <div class="container">
      <div data-tf-live="01KMAPD7ZHXD7HAHAJP9JBH5VR"></div>
      <script src="https://embed.typeform.com/next/embed.js"></script>
    </div>
  </div>

</body>
</html>
